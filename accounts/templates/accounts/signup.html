{% extends 'base.html' %}

{% block title %}Sign up | Echovision Media{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card-glass p-4">
            <span class="tag">Start here</span>
            <h1 class="mt-3">Create an account</h1>
            <p class="section-subtitle">Join Echovision and book your first session.</p>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn btn-brand" type="submit">Sign up</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
