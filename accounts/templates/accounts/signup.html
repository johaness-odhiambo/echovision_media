{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign up | Echovision Media</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'main.css' %}" />
</head>
<body class="bg-white m-0 p-0 overflow-hidden">
    <div class="row g-0 vh-100">
        <div class="col-lg-6 d-none d-lg-block h-100">
            <img src="https://images.unsplash.com/photo-1589254065878-42c9da997008?q=80&w=1200&auto=format&fit=crop" alt="Media Production" class="img-fluid w-100 h-100" style="object-fit: cover;">
        </div>
        <div class="col-lg-6 d-flex align-items-center justify-content-center h-100 bg-white">
            <div class="w-100 p-5 mx-auto" style="max-width: 500px;">
                <div class="text-center mb-5">
                    <h1 class="mt-3 fw-bold">Echovision Media</h1>
                    <h2 class="h4 mt-4">Create an Account</h2>
                    <p class="text-muted">Join Echovision and book your first session.</p>
                </div>
                
                {% if messages %}
                <div class="mb-3">
                    {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                    {% endfor %}
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-brand w-100 py-2 mt-3" type="submit">Sign up</button>
                </form>
                <div class="mt-4 text-center">
                    <a href="{% url 'login' %}" class="text-decoration-none text-muted">Already have an account? <span class="text-primary">Login</span></a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
