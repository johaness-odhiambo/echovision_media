{% extends 'base.html' %}

{% block title %}Login | Echovision Media{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card-glass p-4">
            <span class="tag">Welcome back</span>
            <h1 class="mt-3">Login</h1>
            <p class="section-subtitle">Access your bookings and creative dashboard.</p>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn btn-brand" type="submit">Login</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
